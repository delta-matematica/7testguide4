<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Algebra Practice Test</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;overflow:hidden;font-family:"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top,#123f70 0%,#071a33 45%,#020916 100%);color:white}
    .screen{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px}
    .bg{position:absolute;inset:0;z-index:1;overflow:hidden}
    .grid{position:absolute;inset:-80px;background-image:linear-gradient(rgba(87,214,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(87,214,255,.08) 1px,transparent 1px);background-size:46px 46px;animation:moveGrid 18s linear infinite}
    @keyframes moveGrid{from{transform:translate(0,0) rotate(-2deg)}to{transform:translate(46px,46px) rotate(-2deg)}}
    .stream{position:absolute;left:-20%;width:140%;font-family:Georgia,serif;font-weight:700;color:rgba(255,214,87,.16);white-space:nowrap;animation:stream 26s linear infinite}
    @keyframes stream{from{transform:translateX(-18%)}to{transform:translateX(18%)}}
    .orb{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(78,209,255,.34),rgba(78,209,255,0));animation:pulse 5s ease-in-out infinite alternate}
    @keyframes pulse{from{transform:scale(.85);opacity:.28}to{transform:scale(1.2);opacity:.65}}
    .float-symbol{position:absolute;color:rgba(255,255,255,.15);font-weight:800;text-shadow:0 0 18px rgba(88,215,255,.25);animation:float 16s linear forwards;user-select:none}
    @keyframes float{0%{transform:translateY(110vh) rotate(0deg);opacity:0}12%,82%{opacity:1}100%{transform:translateY(-20vh) rotate(360deg);opacity:0}}

    .card{position:relative;z-index:5;width:min(96vw,1600px);height:min(90vh,900px);aspect-ratio:16/9;padding:34px;border-radius:34px;background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.06));border:1px solid rgba(255,255,255,.22);box-shadow:0 35px 90px rgba(0,0,0,.42),inset 0 0 28px rgba(255,255,255,.07);backdrop-filter:blur(18px);overflow:hidden;text-align:center}
    .test-card{display:flex;flex-direction:column;text-align:left;padding:24px 34px 22px!important}
    .top-label{display:inline-block;padding:10px 24px;border-radius:999px;background:rgba(72,215,255,.16);border:1px solid rgba(99,225,255,.44);color:#8eeeff;font-size:1rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
    h1{font-size:clamp(3.2rem,6vw,6rem);line-height:1.02;letter-spacing:3px;font-weight:900;text-transform:uppercase;text-shadow:0 8px 24px rgba(0,0,0,.35)}
    .title-highlight{display:block;color:#ffd75b;white-space:nowrap}
    h2{font-size:clamp(2.1rem,3.4vw,3.6rem);color:#ffd75b;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
    .subtitle{margin:18px auto 0;max-width:920px;font-size:clamp(1.15rem,1.6vw,1.55rem);line-height:1.5;color:rgba(255,255,255,.82)}
    .info-row{margin:24px auto 0;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:940px}
    .info-box{padding:16px 14px;border-radius:18px;background:rgba(3,15,35,.42);border:1px solid rgba(255,255,255,.12);font-weight:700;font-size:1.05rem}
    .info-box span{display:block;color:#78e8ff;font-size:.82rem;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:5px}
    button{font-family:inherit}
    .start-button,.small-button,.nav-button,.submit-button{position:relative;padding:13px 34px;border:0;border-radius:999px;font-size:1.05rem;font-weight:900;letter-spacing:1.1px;text-transform:uppercase;cursor:pointer}
    .start-button,.small-button,.submit-button{background:linear-gradient(135deg,#ffd75b,#ffb52e);color:#09213d;box-shadow:0 18px 35px rgba(255,184,46,.32)}
    .start-button,.small-button{margin-top:24px}
    .nav-button{background:rgba(142,238,255,.14);border:1px solid rgba(142,238,255,.3);color:#8eeeff}
    .nav-button:disabled{opacity:.35;cursor:not-allowed}

    .form-grid{width:min(980px,100%);margin:22px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:28px}
    .input-group{text-align:left}
    .input-group label{display:block;margin-bottom:8px;color:#8eeeff;font-size:1.05rem;font-weight:900;letter-spacing:1.6px;text-transform:uppercase}
    .input-group input{width:100%;padding:18px 22px;border-radius:16px;border:1px solid rgba(255,255,255,.24);outline:0;background:rgba(2,13,31,.55);color:white;font-size:1.25rem;font-weight:700;text-transform:uppercase}
    .instruction-box{width:min(1050px,100%);margin:16px auto 0;padding:18px 30px;border-radius:22px;background:rgba(2,13,31,.48);border:1px solid rgba(142,238,255,.22);text-align:left;color:rgba(255,255,255,.82);line-height:1.55;font-size:1.15rem}
    .instruction-box h3{color:#ffd75b;font-size:1.2rem;text-transform:uppercase;letter-spacing:1.6px;margin-bottom:10px}
    .instruction-box ul{padding-left:22px}
    .note{max-width:1000px;margin:14px auto 0;color:rgba(255,255,255,.72);line-height:1.6;font-size:1.05rem}

    .test-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .question-count{color:#8eeeff;font-size:1.12rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase}
    .test-layout{flex:1;display:grid;grid-template-columns:1.38fr .62fr;gap:18px;min-height:0}
    .question-panel,.choices-panel{height:100%;min-height:0;padding:22px 24px;border-radius:24px;background:rgba(2,13,31,.55);border:1px solid rgba(255,255,255,.16);box-shadow:inset 0 0 24px rgba(120,232,255,.06);overflow:auto}
    .panel-label{display:inline-block;margin-bottom:10px;padding:7px 13px;border-radius:999px;background:rgba(142,238,255,.12);border:1px solid rgba(142,238,255,.25);color:#8eeeff;font-size:.82rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
    .question-text{font-size:clamp(1.25rem,1.75vw,1.9rem);line-height:1.32;font-weight:600;color:white}
    .choice-button{width:100%;display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:13px 15px;min-height:54px;border-radius:17px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:white;cursor:pointer;font-size:1rem;font-weight:700;text-align:left}
    .choice-button:hover,.choice-button.selected{border-color:rgba(255,215,91,.8);background:rgba(255,215,91,.16)}
    .choice-letter{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:rgba(142,238,255,.16);color:#8eeeff;flex:0 0 auto;font-size:1rem;font-weight:800}
    .test-nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:8px}
    .progress-strip{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:8px}
    .progress-dot{width:24px;height:24px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);font-size:.72rem;font-weight:900;cursor:pointer}
    .progress-dot.answered{background:rgba(142,238,255,.2);color:#8eeeff;border-color:rgba(142,238,255,.42)}
    .progress-dot.active{background:rgba(255,215,91,.28);color:#ffd75b;border-color:rgba(255,215,91,.75)}

    .match-row,.set-row{display:grid;grid-template-columns:1fr 90px;gap:12px;align-items:center;margin:10px 0;padding:12px;border-radius:16px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
    .match-number,.set-number{display:inline-flex;width:30px;height:30px;border-radius:50%;align-items:center;justify-content:center;background:rgba(142,238,255,.16);color:#8eeeff;font-weight:900;margin-right:10px}
    .match-select,.set-input{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.24);background:#08213d;color:white;font-weight:800;text-align:center}
    .set-list{margin-top:8px}
    .set-row{grid-template-columns:1fr 140px}
    .instruction-card,.match-choice{padding:14px;border-radius:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);line-height:1.45}
    .match-choice{display:flex;align-items:center;gap:12px;margin-bottom:10px}

    .visual-box{width:100%;margin:6px 0 14px}
    .visual-title{font-size:.88rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#8eeeff;margin-bottom:8px}
    .visual-stage{position:relative;width:100%;max-width:520px;height:210px;margin:0 auto;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);overflow:hidden}
    .visual-stage.balance{max-width:100%;height:250px}
    .visual-svg{width:100%;height:100%;display:block}
    .geom-label{position:absolute;padding:4px 9px;border-radius:12px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);color:white;font-weight:900;font-size:.98rem;text-align:center;white-space:nowrap}
    .io-tag{position:absolute;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;text-align:center;white-space:nowrap}
    .footer{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(255,255,255,.78);font-size:1.05rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;width:100%;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.45)}

    .result-name{font-size:clamp(2rem,3vw,3.2rem);font-weight:950;text-transform:uppercase;margin-top:14px}
    .result-number{margin-top:20px;font-size:clamp(5rem,10vw,9rem);color:#ffd75b;font-weight:950;line-height:.95}

    @media(max-width:900px){
      body{overflow:auto}
      .screen{height:auto;min-height:100vh;overflow:visible}
      .card{height:auto;min-height:90vh;aspect-ratio:auto;padding:28px 20px}
      .form-grid,.info-row,.test-layout{grid-template-columns:1fr}
      .question-panel,.choices-panel{overflow:visible}
    }
  </style>
  <script>window.MathJax={tex:{inlineMath:[["$","$"]]},svg:{fontCache:"global"}};</script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
  <main class="screen" id="app"></main>
  <script>
    const GOOGLE_SCRIPT_URL="";
    const M=s=>`$${s}$`;
    const FR=(a,b)=>`\\frac{${a}}{${b}}`;

    let studentInfo={firstName:"",lastName:""};
    let current=0, answers=[], floatingTimer=null;

    let questions=[
      {type:"matching",q:"Match each verbal phrase with the correct algebraic expression.",prompts:["Twice a number x added to 3","Five more than a number x","A number x decreased by 7","Three times a number x","Half of a number x"],choices:[["A",M("3x")],["B",M(FR("x","2"))],["C",M("2x+3")],["D",M("x-7")],["E",M("x+5")]],answer:["C","E","D","A","B"]},
      {type:"matching",q:"Match each verbal sentence with the correct algebraic equation.",prompts:["Twice a number x decreased by 3 is 15","Five more than a number x is 12","Three times a number x is 24","A number x divided by 4 is 9","Seven less than a number x is 18"],choices:[["A",M("x+5=12")],["B",M("2x-3=15")],["C",M(`${FR("x","4")}=9`)],["D",M("x-7=18")],["E",M("3x=24")]],answer:["B","A","E","C","D"]},
      {type:"set",title:"One-Step Equations",q:"Solve each one-step equation. Write only the value of x in each box.",note:"Solve all 6 equations. For decimals, you may use comma or period.",items:[[M("x+3=8"),"5"],[M("x-4=7"),"11"],[M("5x=15"),"3"],[M(`${FR("x","3")}=7`),"21"],[M("x+0{,}3=2{,}4"),"2,1"],[M("x-1{,}5=3{,}2"),"4,7"]]},
      {type:"set",title:"Two-Step Equations",q:"Solve each two-step equation. Write only the value of x in each box.",note:"Solve all 6 equations. All answers are positive whole numbers.",items:[[M("2x-1=9"),"5"],[M("3x+5=20"),"5"],[M(`${FR("x","4")}-8=12`),"80"],[M("4x+6=30"),"6"],[M("5x-7=18"),"5"],[M(`${FR("x","3")}+4=10`),"18"]]},
      {type:"set",title:"Simplifying Algebraic Expressions",q:"Simplify each algebraic expression by combining like terms.",note:"Solve all 3 expressions. Write answers without spaces, for example 9x+3y or -5x+8y.",placeholder:"Simplified",items:[[M("6x-2y+3x+5y"),"9x+3y"],[M("8a+4b-3a-7b"),"5a-3b"],[M("-2m+6n+5m-n"),"3m+5n"]]},
      {type:"mc",visual:"io",q:"Use the input-output machine. What is the output?",input:M("x=4"),rule:M("3x+2"),choices:[M("10"),M("12"),M("14"),M("16")],answer:M("14")},
      {type:"mc",q:`The formula to convert Celsius to Fahrenheit is ${M(`F=${FR("9","5")}C+32`)}. Find ${M("F")} when ${M("C=20")}.`,choices:[M("52"),M("60"),M("68"),M("72")],answer:M("68")},
      {type:"mc",q:`A delivery app charges a fixed service fee of ${M("1500")} pesos plus ${M("1200")} pesos for each kilometer traveled. What is the total cost when a distance of ${M("6")} kilometers is traveled?`,choices:[M("7200"),M("7500"),M("8700"),M("9300")],answer:M("8700")},
      {type:"mc",q:`A taxi company charges a base fare of ${M("900")} pesos plus ${M("650")} pesos for each kilometer traveled. What is the total fare when a distance of ${M("8")} kilometers is traveled?`,choices:[M("5200"),M("6100"),M("6500"),M("7100")],answer:M("6100")},
      {type:"mc",visual:"rectangle",labels:[M("3x+2"),M("2x+1")],q:`A rectangle has a base of ${M("3x+2")} and a height of ${M("2x+1")}. Which expression represents the perimeter?`,choices:[M("5x+3"),M("10x+6"),M("6x+4"),M("12x+8")],answer:M("10x+6")},
      {type:"mc",visual:"rectangle",labels:[M("2x+3"),M("x+4")],q:`A rectangle has a base of ${M("2x+3")} and a height of ${M("x+4")}. Find the area when ${M("x=5")}.`,choices:[M("108"),M("117"),M("126"),M("135")],answer:M("117")},
      {type:"mc",q:`Mateo buys ${M("4")} identical notebooks and also pays ${M("1200")} pesos for a folder. The total amount is ${M("6800")} pesos. If ${M("x")} is the price of one notebook, which equation represents this situation?`,choices:[M("4x+1200=6800"),M("4x-1200=6800"),M("1200x+4=6800"),M("x+1200=6800")],answer:M("4x+1200=6800")},
      {type:"mc",q:`Sofía buys ${M("5")} identical pencils. She uses a discount coupon of ${M("300")} pesos, so the final amount is ${M("1700")} pesos. If ${M("x")} is the price of one pencil, what is ${M("x")}?`,choices:[M("300"),M("400"),M("500"),M("600")],answer:M("400")},
      {type:"mc",q:`To solve the equation ${M("4x+7=31")}, what should be the first step?`,choices:[`Subtract ${M("7")} from both sides.`,`Divide both sides by ${M("4")}.`,`Add ${M("7")} to both sides.`,`Multiply both sides by ${M("4")}.`],answer:`Subtract ${M("7")} from both sides.`},
      {type:"mc",q:`Camila had some stickers. Her friend gave her ${M("9")} more stickers. Now she has ${M("24")} stickers. If ${M("x")} is the number she had at first, what is ${M("x")}?`,choices:[M("13"),M("15"),M("17"),M("33")],answer:M("15")},
      {type:"mc",q:`A school buys ${M("6")} identical notebooks. The total cost is ${M("7200")} pesos. If ${M("x")} is the price of one notebook, what is ${M("x")}?`,choices:[M("1000"),M("1100"),M("1200"),M("1300")],answer:M("1200")},
      {type:"mc",q:`Daniel shares his marbles equally into ${M("4")} bags. Each bag has ${M("9")} marbles. If ${M("x")} is the total number of marbles, what is ${M("x")}?`,choices:[M("13"),M("27"),M("36"),M("45")],answer:M("36")},
      {type:"mc",q:`Evaluate ${M(`${FR("12","x")}+${FR("8","y")}`)} when ${M("x=3")} and ${M("y=4")}.`,choices:[M("5"),M("6"),M("7"),M("8")],answer:M("6")},
      {type:"mc",visual:"triangle",labels:[M("2x"),M("3x+1"),M("2x+3")],q:`The sides of a triangle are ${M("2x")}, ${M("3x+1")}, and ${M("2x+3")}. Find the perimeter when ${M("x=2")}.`,choices:[M("16"),M("18"),M("20"),M("22")],answer:M("18")},
      {type:"mc",visual:"balance",balanceData:{leftX:2,leftOnes:4,rightBig:[4,4],rightOnes:2},q:`Which of the following equations describes the figure?`,choices:[M("2x+4=10"),M("2x-4=10"),M("x+4=10"),M("4x+2=10")],answer:M("2x+4=10")},
      {type:"mc",q:`Valentina takes a colectivo in Santiago. The colectivo charges a fixed starting fee of ${M("800")} pesos plus ${M("650")} pesos for each kilometer traveled. The total cost of the trip is ${M("5350")} pesos. If ${M("x")} represents the number of kilometers traveled, what is the value of ${M("x")}?`,choices:[M("5"),M("6"),M("7"),M("8")],answer:M("7")},
      {type:"mc",visual:"square",labels:[M("2x+1")],q:`A square has a side length of ${M("2x+1")} centimeters. Find the area of the square when ${M("x=4")}.`,choices:[M("64"),M("72"),M("81"),M("100")],answer:M("81")},
      {type:"mc",q:`Simplify using the distributive property: ${M("2(3x+4)+5x")}.`,choices:[M("11x+8"),M("6x+8"),M("11x+4"),M("6x+13")],answer:M("11x+8")},
      {type:"mc",q:`A student buys ${M("4")} identical completos and a juice that costs ${M("1200")} pesos. The total amount paid is ${M("7600")} pesos. If ${M("x")} is the price of one completo, what is the value of ${M("x")}?`,choices:[M("1400"),M("1500"),M("1600"),M("1700")],answer:M("1600")},
      {type:"mc",q:`Twice a number ${M("x")} added to ${M("5")} is ${M("19")}. Find the number.`,choices:[M("5"),M("6"),M("7"),M("8")],answer:M("7")}
    ];

    function bgHTML(){
      return `<div class="bg" id="bg"><div class="grid"></div><div class="stream" style="top:18%;font-size:2.2rem">x + 7 = 15 &nbsp;&nbsp; 3a - 5 = 10 &nbsp;&nbsp; y = 2x + 1 &nbsp;&nbsp;</div><div class="stream" style="top:74%;font-size:1.8rem;animation-direction:reverse">2x = 18 &nbsp;&nbsp; p ÷ 4 = 6 &nbsp;&nbsp; n - 12 = 9 &nbsp;&nbsp;</div><div class="orb" style="width:260px;height:260px;top:8%;left:12%"></div><div class="orb" style="width:340px;height:340px;bottom:2%;right:8%"></div></div><div class="footer">© 2026 Delta Matemática | Luis Ramos Jr. All Rights Reserved.</div>`;
    }

    function startFloat(){
      clearInterval(floatingTimer);
      const bg=document.getElementById("bg");
      if(!bg) return;
      const symbols=["x","y","a","b","2x+3","x/4=9","3n=21","x<8","y=mx+b","x²"];
      function add(){
        const d=document.createElement("div");
        d.className="float-symbol";
        d.textContent=symbols[Math.floor(Math.random()*symbols.length)];
        d.style.left=Math.random()*100+"vw";
        d.style.fontSize=(22+Math.random()*36)+"px";
        d.style.animationDuration=(12+Math.random()*10)+"s";
        bg.appendChild(d);
        setTimeout(()=>d.remove(),23000);
      }
      for(let i=0;i<18;i++) add();
      floatingTimer=setInterval(add,1500);
    }

    function renderOpening(){
      app.innerHTML=`${bgHTML()}<section class="card"><div class="top-label">7° Grade Mathematics</div><h1>Algebra<span class="title-highlight">Practice Test</span></h1><p class="subtitle">Strengthen your algebra skills through variables, expressions, equations, substitution, models, and geometry word problems.</p><div class="info-row"><div class="info-box"><span>Level</span>Grade 7</div><div class="info-box"><span>Questions</span>25</div><div class="info-box"><span>Format</span>Practice Test</div></div><button class="start-button" onclick="beginTest()">Start Test</button></section>`;
      startFloat();
    }

    function beginTest(){
      studentInfo={firstName:"",lastName:""};
      answers=questions.map(q=>q.type==="matching"?Array(q.prompts.length).fill(""):q.type==="set"?Array(q.items.length).fill(""):null);
      current=0;
      renderQuestion();
    }

    function renderQuestion(){
      const q=questions[current], ans=answers[current];
      const answered=questions.filter((x,i)=>isAnswered(x,answers[i])).length;
      app.innerHTML=`${bgHTML()}<section class="card test-card"><div class="test-header"><div><div class="question-count">Question ${current+1} of ${questions.length}</div><div class="note" style="margin:4px 0 0">Answered: ${answered} of ${questions.length}</div></div></div><div class="test-layout"><div class="question-panel"><div class="panel-label">Question</div>${renderQuestionPanel(q,ans)}</div><div class="choices-panel"><div class="panel-label">Answer Area</div>${renderAnswerPanel(q,ans)}</div></div><div class="test-nav"><button class="nav-button" onclick="move(-1)" ${current===0?"disabled":""}>Back</button><button class="nav-button" onclick="move(1)" ${current===questions.length-1?"disabled":""}>Next</button><button class="submit-button" onclick="submitTest()">Submit</button></div><div class="progress-strip">${questions.map((q,i)=>`<button class="progress-dot ${isAnswered(q,answers[i])?"answered":""} ${i===current?"active":""}" onclick="go(${i})">${i+1}</button>`).join("")}</div></section>`;
      startFloat();
      typeset();
    }

    function renderQuestionPanel(q,ans){
      if(q.type==="matching"){
        return `<div class="question-text">${q.q}</div>`+q.prompts.map((p,i)=>`<div class="match-row"><div><span class="match-number">${i+1}</span>${p}</div><select class="match-select" onchange="setMatch(${i},this.value)"><option value="">Choose</option>${q.choices.map(c=>`<option value="${c[0]}" ${ans[i]===c[0]?"selected":""}>${c[0]}</option>`).join("")}</select></div>`).join("");
      }
      if(q.type==="set"){
        return `<div class="question-text">${q.q}</div><div class="set-list">`+q.items.map((it,i)=>`<div class="set-row"><div><span class="set-number">${i+1}</span>${it[0]}</div><input class="set-input" placeholder="${q.placeholder||'x = ?'}" value="${escapeAttr(ans[i]||"")}" oninput="setSetAnswer(${i},this.value)"></div>`).join("")+`</div>`;
      }
      return `${renderVisual(q)}<div class="question-text">${q.q}</div>`;
    }

    function renderAnswerPanel(q,ans){
      if(q.type==="matching"){
        return q.choices.map(c=>`<div class="match-choice"><span class="choice-letter">${c[0]}</span><span>${c[1]}</span></div>`).join("");
      }
      if(q.type==="set"){
        const n=ans.filter(v=>String(v||"").trim()).length;
        return `<div class="instruction-card"><strong>${q.title}</strong><br><br>${q.note}</div>`;
      }
      return q.choices.map((c,i)=>`<button class="choice-button ${ans===c?"selected":""}" onclick="selectChoice(${i})"><span class="choice-letter">${String.fromCharCode(65+i)}</span><span>${c}</span></button>`).join("");
    }

    function renderVisual(q){
      if(q.visual==="io") return `<div class="visual-box"><div class="visual-title">Input–Output Model</div><div class="visual-stage"><svg class="visual-svg" viewBox="0 0 420 175"><polygon points="16,56 72,56 108,86 72,116 16,116" fill="rgba(142,238,255,.12)" stroke="rgba(142,238,255,.9)" stroke-width="3"/><rect x="140" y="45" width="150" height="82" rx="9" fill="rgba(255,215,91,.14)" stroke="rgba(255,215,91,.95)" stroke-width="3"/><circle cx="374" cy="87" r="30" fill="rgba(255,215,91,.12)" stroke="rgba(255,215,91,.95)" stroke-width="3"/></svg><div class="io-tag" style="left:25px;top:82px;width:90px">${q.input}</div><div class="io-tag" style="left:165px;top:75px;width:100px">${q.rule}</div><div class="io-tag" style="right:35px;top:76px;width:60px;color:#ffd75b;font-size:1.4rem">?</div></div></div>`;
      if(q.visual==="triangle") return `<div class="visual-box"><div class="visual-title">Figure</div><div class="visual-stage"><svg class="visual-svg" viewBox="0 0 420 220"><polygon points="210,28 70,180 350,180" fill="rgba(255,255,255,.04)" stroke="rgba(255,215,91,.95)" stroke-width="4"/></svg><div class="geom-label" style="left:48px;top:98px">${q.labels[0]}</div><div class="geom-label" style="right:48px;top:98px">${q.labels[1]}</div><div class="geom-label" style="left:50%;bottom:12px;transform:translateX(-50%)">${q.labels[2]}</div></div></div>`;
      if(q.visual==="rectangle") return `<div class="visual-box"><div class="visual-title">Figure</div><div class="visual-stage"><svg class="visual-svg" viewBox="0 0 420 220"><rect x="95" y="50" width="230" height="110" fill="rgba(255,255,255,.04)" stroke="rgba(142,238,255,.95)" stroke-width="4"/></svg><div class="geom-label" style="left:50%;top:12px;transform:translateX(-50%)">${q.labels[0]}</div><div class="geom-label" style="right:22px;top:50%;transform:translateY(-50%)">${q.labels[1]}</div></div></div>`;
      if(q.visual==="square") return `<div class="visual-box"><div class="visual-title">Figure</div><div class="visual-stage"><svg class="visual-svg" viewBox="0 0 420 220"><rect x="135" y="38" width="150" height="150" fill="rgba(255,255,255,.04)" stroke="rgba(142,238,255,.95)" stroke-width="4"/></svg><div class="geom-label" style="left:50%;bottom:12px;transform:translateX(-50%)">${q.labels[0]}</div></div></div>`;
      if(q.visual==="balance") return balanceVisual(q.balanceData);
      return "";
    }

    function balanceVisual(data){
      const cfg=Object.assign({leftX:2,leftOnes:4,rightBig:[4,4],rightOnes:2},data||{});
      const circleYs={1:[58],2:[40,76],3:[20,52,84]}[cfg.leftX]||[40,76];
      const leftBoxYs={1:[50],2:[34,66],3:[18,46,74],4:[10,34,58,82]}[cfg.leftOnes]||[10,34,58,82];
      const rightBigYs={1:[44],2:[28,62],3:[12,44,76]}[cfg.rightBig.length]||[28,62];
      const rightOneYs={0:[],1:[50],2:[36,64]}[cfg.rightOnes]||[];
      const leftCircles=circleYs.map(y=>`<circle cx="155" cy="${y}" r="12" fill="rgba(255,215,91,.16)" stroke="rgba(255,215,91,.95)" stroke-width="2.2"/><text x="155" y="${y+5}" text-anchor="middle" font-size="16" font-weight="700" fill="white">x</text>`).join("");
      const leftBoxes=leftBoxYs.map(y=>`<rect x="225" y="${y}" width="18" height="18" rx="3" fill="rgba(142,238,255,.18)" stroke="rgba(142,238,255,.95)" stroke-width="2"/><text x="234" y="${y+13}" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>`).join("");
      const rightBigBoxes=rightBigYs.map((y,i)=>`<rect x="365" y="${y}" width="30" height="30" rx="5" fill="rgba(255,215,91,.16)" stroke="rgba(255,215,91,.95)" stroke-width="2.2"/><text x="380" y="${y+20}" text-anchor="middle" font-size="16" font-weight="700" fill="white">${cfg.rightBig[i]}</text>`).join("");
      const rightSmallBoxes=rightOneYs.map(y=>`<rect x="440" y="${y}" width="18" height="18" rx="3" fill="rgba(142,238,255,.18)" stroke="rgba(142,238,255,.95)" stroke-width="2"/><text x="449" y="${y+13}" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>`).join("");
      return `<div class="visual-box"><div class="visual-title">Balance Scale</div><div class="visual-stage balance"><svg class="visual-svg" viewBox="0 0 600 300" preserveAspectRatio="xMidYMid meet"><line x1="300" y1="52" x2="300" y2="210" stroke="rgba(255,255,255,.92)" stroke-width="8" stroke-linecap="round"/><polygon points="282,68 318,68 300,44" fill="rgba(255,215,91,.95)"/><line x1="110" y1="95" x2="490" y2="95" stroke="rgba(255,215,91,.95)" stroke-width="8" stroke-linecap="round"/><polygon points="270,210 330,210 355,242 245,242" fill="rgba(255,255,255,.10)" stroke="rgba(255,255,255,.20)" stroke-width="2"/>${leftCircles}${leftBoxes}${rightBigBoxes}${rightSmallBoxes}</svg></div></div>`;
    }

    function unit(x,y){return `<circle cx="${x}" cy="${y}" r="11" fill="rgba(142,238,255,.20)" stroke="rgba(142,238,255,.95)" stroke-width="2"/><text x="${x}" y="${y+4}" text-anchor="middle" font-size="12" font-weight="700" fill="white">1</text>`}

    function setMatch(i,v){answers[current][i]=v;renderQuestion()}
    function setSetAnswer(i,v){answers[current][i]=v}
    function selectChoice(i){answers[current]=questions[current].choices[i];renderQuestion()}
    function move(d){current+=d;renderQuestion()}
    function go(i){current=i;renderQuestion()}

    function norm(v){return String(v||"").trim().toLowerCase().replace(/\s+/g,"").replace(/−/g,"-").replace(",",".")}
    function isAnswered(q,a){
      if(q.type==="matching") return Array.isArray(a)&&a.every(Boolean);
      if(q.type==="set") return Array.isArray(a)&&a.every(v=>String(v||"").trim());
      return a!==null;
    }
    function isCorrect(q,a){
      if(q.type==="matching") return q.answer.every((v,i)=>a[i]===v);
      if(q.type==="set") return q.items.every((it,i)=>norm(it[1])===norm(a[i]));
      return a===q.answer;
    }

    function submitTest(){
      const missing=questions.findIndex((q,i)=>!isAnswered(q,answers[i]));
      if(missing>=0){alert(`Please answer all questions before submitting. Question ${missing+1} is still unanswered.`);current=missing;renderQuestion();return}
      app.innerHTML=`${bgHTML()}<section class="card"><div class="top-label">Review Before Submit</div><h2>All Questions Answered</h2><p class="note" style="font-size:1.5rem;font-weight:800;color:#8eeeff">You answered all 25 questions.</p><p class="note">You may review your answers before submitting. Once submitted, your result will be shown.</p><div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:30px"><button class="nav-button" onclick="current=0;renderQuestion()">Review Answers</button><button class="submit-button" onclick="finalSubmit()">Submit Test</button></div></section>`;
      startFloat();
    }

    function finalSubmit(){
      const score=questions.reduce((s,q,i)=>s+(isCorrect(q,answers[i])?1:0),0);
      const pct=Math.round(score/questions.length*100);
      submitScore(score,pct);
      const remark=pct>=70?"CONGRATULATIONS":"TRY AGAIN";
      const color=pct>=70?"#ffd75b":"#ff9b9b";
      app.innerHTML=`${bgHTML()}<section class="card"><div class="top-label">Result</div><div class="result-name">Practice Test Result</div><div class="result-number">${score} / ${questions.length}</div><p class="note" style="font-size:2rem!important;font-weight:950;color:#8eeeff">Percentage: ${pct}%</p><p class="note" style="font-size:2.5rem!important;font-weight:950;color:${color};letter-spacing:1.5px;text-transform:uppercase">${remark}</p><div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:24px">
        <button class="small-button" onclick="tryAgain()">Try Again</button>
        <button class="nav-button" onclick="renderOpening()">Home</button>
      </div></section>`;
      startFloat();
    }

    function makeChoices(correct, step=1){
      const set=new Set([correct]);
      let k=1;
      while(set.size<4){
        set.add(correct + step*k);
        if(set.size<4) set.add(Math.max(0, correct - step*k));
        k++;
      }
      return Array.from(set).sort((a,b)=>a-b).map(n=>M(String(n)));
    }


    function numberProblemVariation(){
      const options=[
        {a:2,b:5,x:7,phrase:"Twice a number"},
        {a:3,b:4,x:6,phrase:"Three times a number"},
        {a:4,b:3,x:5,phrase:"Four times a number"},
        {a:5,b:2,x:4,phrase:"Five times a number"},
        {a:2,b:9,x:8,phrase:"Twice a number"},
        {a:3,b:7,x:5,phrase:"Three times a number"}
      ];
      const p=options[Math.floor(Math.random()*options.length)];
      const total=p.a*p.x+p.b;
      const wrongs=new Set([p.x,p.x+1,Math.max(1,p.x-1),p.x+2]);
      const choices=Array.from(wrongs).slice(0,4).sort((m,n)=>m-n).map(n=>M(String(n)));
      return {
        q:`${p.phrase} ${M("x")} added to ${M(String(p.b))} is ${M(String(total))}. Find the number.`,
        choices,
        answer:M(String(p.x))
      };
    }

    function balanceProblemVariation(){
      const options=[
        {balanceData:{leftX:2,leftOnes:4,rightBig:[4,4],rightOnes:2},choices:[M("2x+4=10"),M("2x-4=10"),M("x+4=10"),M("4x+2=10")],answer:M("2x+4=10")},
        {balanceData:{leftX:3,leftOnes:2,rightBig:[4,4,4],rightOnes:2},choices:[M("3x+2=14"),M("3x-2=14"),M("2x+3=14"),M("x+2=14")],answer:M("3x+2=14")},
        {balanceData:{leftX:2,leftOnes:1,rightBig:[4,4],rightOnes:1},choices:[M("2x+1=9"),M("2x-1=9"),M("x+2=9"),M("4x+1=9")],answer:M("2x+1=9")}
      ];
      return options[Math.floor(Math.random()*options.length)];
    }

    function makeTryAgainQuestions(){
      const oneA=rand(2,9), oneB=rand(10,24), oneX=oneB-oneA;
      const subA=rand(3,9), subX=rand(5,16), subB=subX-subA;
      const mulA=rand(3,9), mulX=rand(2,12), mulB=mulA*mulX;
      const divA=rand(2,8), divB=rand(3,12), divX=divA*divB;

      const two1A=rand(2,7), two1X=rand(3,10), two1B=rand(1,9), two1C=two1A*two1X+two1B;
      const two2A=rand(2,7), two2X=rand(3,10), two2B=rand(1,9), two2C=two2A*two2X-two2B;
      const two3A=rand(2,8), two3X=rand(12,40), two3B=rand(2,9), two3C=two3X/two3A+two3B;

      const fee=rand(500,1300,100), rate=rand(400,900,50), km=rand(4,10), total=fee+rate*km;
      const sideA=rand(2,5), sideB=rand(1,6), sideX=rand(3,8), side=sideA*sideX+sideB, area=side*side;
      const balanceVar=balanceProblemVariation();
      const numVar=numberProblemVariation();

      return [
        {type:"matching",q:"Match each verbal phrase with the correct algebraic expression.",prompts:["Four more than twice a number x","Three less than a number x","Five times a number x","A number x divided by 3","The sum of a number x and 9"],choices:[["A",M("5x")],["B",M(`${FR("x","3")}`)],["C",M("2x+4")],["D",M("x+9")],["E",M("x-3")]],answer:["C","E","A","B","D"]},
        {type:"matching",q:"Match each verbal sentence with the correct algebraic equation.",prompts:["Three times a number x plus 4 is 22","A number x decreased by 6 is 15","Four times a number x is 28","A number x divided by 5 is 8","Two more than a number x is 19"],choices:[["A",M("4x=28")],["B",M("x-6=15")],["C",M(`${FR("x","5")}=8`)],["D",M("3x+4=22")],["E",M("x+2=19")]],answer:["D","B","A","C","E"]},
        {type:"set",title:"One-Step Equations",q:"Solve each one-step equation. Write only the value of x in each box.",note:"Solve all 6 equations. For decimals, you may use comma or period.",items:[[M(`x+${oneA}=${oneB}`),String(oneX)],[M(`x-${subA}=${subB}`),String(subX)],[M(`${mulA}x=${mulB}`),String(mulX)],[M(`${FR("x",divA)}=${divB}`),String(divX)],[M("x+0{,}4=3{,}1"),"2,7"],[M("x-1{,}2=4{,}5"),"5,7"]]},
        {type:"set",title:"Two-Step Equations",q:"Solve each two-step equation. Write only the value of x in each box.",note:"Solve all 6 equations. All answers are positive whole numbers.",items:[[M(`${two1A}x+${two1B}=${two1C}`),String(two1X)],[M(`${two2A}x-${two2B}=${two2C}`),String(two2X)],[M(`${FR("x",two3A)}+${two3B}=${two3C}`),String(two3X)],[M("5x+4=34"),"6"],[M("6x-8=40"),"8"],[M(`${FR("x","4")}+7=15`),"32"]]},
        {type:"set",title:"Simplifying Algebraic Expressions",q:"Simplify each algebraic expression by combining like terms.",note:"Solve all 3 expressions. Write answers without spaces, for example 9x+3y or -5x+8y.",placeholder:"Simplified",items:[[M("5x+4y+2x-7y"),"7x-3y"],[M("9a-3b-4a+8b"),"5a+5b"],[M("-3m+7n+8m-2n"),"5m+5n"]]},
        {type:"mc",visual:"io",q:"Use the input-output machine. What is the output?",input:M("x=6"),rule:M("2x+5"),choices:[M("13"),M("15"),M("17"),M("19")],answer:M("17")},
        {type:"mc",q:`The formula to convert Celsius to Fahrenheit is ${M(`F=${FR("9","5")}C+32`)}. Find ${M("F")} when ${M("C=30")}.`,choices:[M("76"),M("82"),M("86"),M("90")],answer:M("86")},
        {type:"mc",q:`A phone company charges a fixed monthly fee of ${M("3000")} pesos plus ${M("250")} pesos for each extra gigabyte used. What is the total cost when ${M("8")} extra gigabytes are used?`,choices:[M("4500"),M("5000"),M("5200"),M("5600")],answer:M("5000")},
        {type:"mc",q:`A parking lot charges ${M("1000")} pesos to enter plus ${M("700")} pesos per hour. What is the total cost for ${M("5")} hours?`,choices:[M("3500"),M("4200"),M("4500"),M("5000")],answer:M("4500")},
        {type:"mc",visual:"rectangle",labels:[M("4x+1"),M("x+3")],q:`A rectangle has a base of ${M("4x+1")} and a height of ${M("x+3")}. Which expression represents the perimeter?`,choices:[M("5x+4"),M("10x+8"),M("8x+2"),M("12x+10")],answer:M("10x+8")},
        {type:"mc",visual:"rectangle",labels:[M("3x+2"),M("x+5")],q:`A rectangle has a base of ${M("3x+2")} and a height of ${M("x+5")}. Find the area when ${M("x=3")}.`,choices:[M("72"),M("80"),M("88"),M("96")],answer:M("88")},
        {type:"mc",q:`Tomás buys ${M("3")} identical empanadas and a drink that costs ${M("1200")} pesos. He spends ${M("5700")} pesos in total. If ${M("x")} is the price of one empanada, which equation represents this situation?`,choices:[M("3x+1200=5700"),M("3x-1200=5700"),M("1200x+3=5700"),M("x+1200=5700")],answer:M("3x+1200=5700")},
        {type:"mc",q:`Isidora buys ${M("4")} identical notebooks. She uses a ${M("500")} peso discount coupon, so she pays ${M("5500")} pesos. If ${M("x")} is the price of one notebook, what is ${M("x")}?`,choices:[M("1250"),M("1400"),M("1500"),M("1600")],answer:M("1500")},
        {type:"mc",q:`To solve the equation ${M("5x-6=29")}, what should be the first step?`,choices:[`Add ${M("6")} to both sides.`,`Subtract ${M("6")} from both sides.`,`Divide both sides by ${M("5")}.`,`Multiply both sides by ${M("5")}.`],answer:`Add ${M("6")} to both sides.`},
        {type:"mc",q:`Martina had some pesos in her wallet. Her mother gave her ${M("2500")} more pesos. Now she has ${M("9700")} pesos. If ${M("x")} is the amount she had at first, what is ${M("x")}?`,choices:[M("6200"),M("7200"),M("8200"),M("12200")],answer:M("7200")},
        {type:"mc",q:`A bookstore sells ${M("5")} identical folders for ${M("4750")} pesos. If ${M("x")} is the price of one folder, what is ${M("x")}?`,choices:[M("850"),M("900"),M("950"),M("1000")],answer:M("950")},
        {type:"mc",q:`A box of markers is shared equally among ${M("6")} students. Each student receives ${M("8")} markers. If ${M("x")} is the total number of markers, what is ${M("x")}?`,choices:[M("14"),M("36"),M("48"),M("56")],answer:M("48")},
        {type:"mc",q:`Evaluate ${M(`${FR("18","x")}+${FR("15","y")}`)} when ${M("x=6")} and ${M("y=5")}.`,choices:[M("5"),M("6"),M("7"),M("8")],answer:M("6")},
        {type:"mc",visual:"triangle",labels:[M("x+5"),M("2x+2"),M("3x-1")],q:`The sides of a triangle are ${M("x+5")}, ${M("2x+2")}, and ${M("3x-1")}. Find the perimeter when ${M("x=4")}.`,choices:[M("28"),M("30"),M("32"),M("34")],answer:M("30")},
        {type:"mc",visual:"balance",balanceData:balanceVar.balanceData,q:`Which of the following equations describes the figure?`,choices:balanceVar.choices,answer:balanceVar.answer},
        {type:"mc",q:`Fernanda takes a colectivo in Valparaíso. The colectivo charges a fixed starting fee of ${M("700")} pesos plus ${M("600")} pesos for each kilometer. The total cost is ${M("4900")} pesos. If ${M("x")} is the number of kilometers, what is ${M("x")}?`,choices:[M("6"),M("7"),M("8"),M("9")],answer:M("7")},
        {type:"mc",visual:"square",labels:[M(`${sideA}x+${sideB}`)],q:`A square has a side length of ${M(`${sideA}x+${sideB}`)} centimeters. Find the area when ${M(`x=${sideX}`)}.`,choices:makeChoices(area,9),answer:M(String(area))},
        {type:"mc",q:`Simplify using the distributive property: ${M("3(4x-5)-2x")}.`,choices:[M("10x-15"),M("12x-15"),M("10x-5"),M("14x-15")],answer:M("10x-15")},
        {type:"mc",q:`A student buys ${M("3")} identical sandwiches and a bottle of water that costs ${M("900")} pesos. The total amount paid is ${M("5400")} pesos. If ${M("x")} is the price of one sandwich, what is the value of ${M("x")}?`,choices:[M("1200"),M("1300"),M("1500"),M("1800")],answer:M("1500")},
        {type:"mc",q:numVar.q,choices:numVar.choices,answer:numVar.answer}
      ];
    }

    function rand(min,max,step=1){
      const count=Math.floor((max-min)/step)+1;
      return min+step*Math.floor(Math.random()*count);
    }

    function tryAgain(){
      questions=makeTryAgainQuestions();
      answers=questions.map(q=>q.type==="matching"?Array(q.prompts.length).fill(""):q.type==="set"?Array(q.items.length).fill(""):null);
      current=0;
      renderQuestion();
    }

    async function submitScore(score,percentage){
      const payload={score,percentage};
      console.log("Score data prepared:",payload);
      if(!GOOGLE_SCRIPT_URL) return;
      try{await fetch(GOOGLE_SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})}
      catch(e){console.error("Score submission failed:",e)}
    }

    function typeset(){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise().catch(console.log)}
    function escapeAttr(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;")}
    renderOpening();
  </script>
</body>
</html>
